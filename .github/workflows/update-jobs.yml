name: Fetch & Add Visa Jobs

on:
  schedule:
    # Run every day at 07:00 UTC
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Specific source to run (leave blank for all)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - arbeitnow
          - relocateme
          - swissdevjobs
          - visasponsor
          - jaabz
      max:
        description: "Max jobs to fetch per source"
        required: false
        default: "100"
        type: string

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── Secret validation ────────────────────────────────────────────────
      - name: Validate secrets
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "⚠️  GEMINI_API_KEY is not set — will use keyword classifier only."
          else
            echo "✅ GEMINI_API_KEY is set."
          fi
          echo "GEMINI_MODEL=${GEMINI_MODEL}"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}

      # ── Step 1: Fetch real jobs from job boards ───────────────────────────
      - name: Fetch visa-sponsored jobs from real sources
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Provide model from secret; fall back to default in the script itself
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        run: |
          MAX="${{ github.event.inputs.max || '100' }}"
          SOURCE="${{ github.event.inputs.source }}"
          CMD="node scripts/fetch-jobs.js --max=$MAX"
          if [ -n "$SOURCE" ]; then
            CMD="$CMD --source=$SOURCE"
          fi
          echo "Running: $CMD"
          $CMD

      # ── Step 2: Detect changes ────────────────────────────────────────────
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/_data/jobs.json db.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new jobs were added."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            ADDED=$(git diff src/_data/jobs.json | grep -c '^+.*"company"' || echo 0)
            echo "added=$ADDED" >> $GITHUB_OUTPUT
            echo "New jobs to commit: $ADDED"
            git diff --stat src/_data/jobs.json db.json
          fi

      # ── Step 3: Commit & push ─────────────────────────────────────────────
      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/_data/jobs.json db.json scripts/added-jobs.log
          ADDED="${{ steps.changes.outputs.added }}"
          TODAY=$(date -u +"%B %-d, %Y")
          git commit -m "feat(jobs): add ${ADDED} visa-sponsored jobs (${TODAY})"
          git push

      # ── Step 4: Trigger site rebuild ─────────────────────────────────────
      - name: Trigger site deploy
        if: steps.changes.outputs.changed == 'true'
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
