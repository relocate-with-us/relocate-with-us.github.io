name: Check Job Availability

on:
  schedule:
    # Run every Monday and Thursday at 06:00 UTC
    - cron: "0 6 * * 1,4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check job URLs
        run: node scripts/check-jobs.js --batch=100

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/_data/jobs.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "$(git diff --stat src/_data/jobs.json)"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/_data/jobs.json scripts/removed-jobs.log
          REMOVED=$(git diff --cached --numstat src/_data/jobs.json | awk '{print $2}')
          git commit -m "$(cat <<'EOF'
          chore: remove $REMOVED unavailable job listings

          Automated check found dead apply URLs (404/410/DNS failures).
          See scripts/removed-jobs.log for details.
          EOF
          )"
          git push
